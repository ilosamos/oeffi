name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is not reachable from origin/main"
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --all-targets --all-features

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: quality-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add "${{ matrix.target }}"

      - name: Install cross (Linux cross-targets)
        if: startsWith(matrix.target, 'aarch64-unknown-linux')
        uses: taiki-e/install-action@cross

      - name: Build release binary (cargo)
        if: ${{ !startsWith(matrix.target, 'aarch64-unknown-linux') }}
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build release binary (cross)
        if: startsWith(matrix.target, 'aarch64-unknown-linux')
        run: cross build --release --locked --target "${{ matrix.target }}"

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          PKG_DIR="oeffi-${VERSION}-${TARGET}"
          mkdir -p "$PKG_DIR"
          cp "target/${TARGET}/release/oeffi" "$PKG_DIR/"
          cp README.md "$PKG_DIR/"
          if [ -f LICENSE ]; then
            cp LICENSE "$PKG_DIR/"
          fi
          tar -czf "${PKG_DIR}.tar.gz" "$PKG_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oeffi-${{ matrix.target }}
          path: oeffi-*.tar.gz

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Artifacts
            - `oeffi-<version>-x86_64-apple-darwin.tar.gz`
            - `oeffi-<version>-aarch64-apple-darwin.tar.gz`
            - `oeffi-<version>-x86_64-unknown-linux-gnu.tar.gz`
            - `oeffi-<version>-aarch64-unknown-linux-gnu.tar.gz`
            - `SHA256SUMS.txt`

            ## Verification
            ```bash
            shasum -a 256 -c SHA256SUMS.txt
            ```
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
